<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎂 You're Invited to a Birthday Party!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@400;600;800&family=Sacramento&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --hot-pink: #ff2d87;
    --electric-blue: #00d4ff;
    --sunny: #ffe156;
    --orange: #ff6b35;
    --lime: #7cff51;
    --purple: #b24dff;
    --deep-bg: #0a001a;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Baloo 2', cursive; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: var(--deep-bg); color: white;
  }

  /* ===== SETUP ===== */
  #setupScreen {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a001a 0%, #1a0040 50%, #0a001a 100%);
    overflow-y: auto;
  }
  .setup-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 36px 32px;
    max-width: 400px; width: 90%; margin: 20px 0;
    text-align: center;
  }
  .setup-card h2 {
    font-family: 'Fredoka One', cursive; font-size: 1.8rem;
    background: linear-gradient(135deg, var(--hot-pink), var(--sunny), var(--electric-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 4px;
  }
  .setup-card .sub { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 20px; }
  .setup-card label {
    display: block; text-align: left; font-size: 0.8rem;
    color: rgba(255,255,255,0.5); margin-bottom: 5px; margin-top: 14px;
  }
  .setup-card input, .setup-card textarea {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; color: white; font-family: 'Baloo 2', cursive; font-size: 0.95rem;
    outline: none; transition: border 0.3s;
  }
  .setup-card input:focus, .setup-card textarea:focus { border-color: var(--hot-pink); }
  .setup-card textarea { resize: none; height: 64px; }
  .setup-card input::placeholder, .setup-card textarea::placeholder { color: rgba(255,255,255,0.2); }

  /* Game picker */
  .game-picker { margin-top: 16px; text-align: left; }
  .game-picker label { margin-bottom: 8px; }
  .game-options { display: flex; flex-wrap: wrap; gap: 8px; }
  .game-opt {
    flex: 1 1 calc(50% - 4px);
    padding: 10px 8px; border-radius: 12px;
    background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
    cursor: pointer; text-align: center; transition: all 0.25s;
    font-size: 0.85rem; color: rgba(255,255,255,0.6);
  }
  .game-opt:hover { border-color: rgba(255,255,255,0.25); }
  .game-opt.selected { border-color: var(--hot-pink); background: rgba(255,45,135,0.1); color: white; }
  .game-opt .game-emoji { font-size: 1.5rem; display: block; margin-bottom: 2px; }

  /* Buttons row */
  .setup-buttons { display: flex; gap: 10px; margin-top: 22px; }
  .btn-go {
    flex: 1; padding: 13px 16px; border: none; border-radius: 50px;
    font-family: 'Fredoka One', cursive; font-size: 1.05rem;
    background: linear-gradient(135deg, var(--hot-pink), var(--orange));
    color: white; cursor: pointer;
    box-shadow: 0 4px 25px rgba(255,45,135,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-go:hover { transform: scale(1.03); box-shadow: 0 6px 35px rgba(255,45,135,0.6); }
  .btn-link {
    flex: 1; padding: 13px 16px; border: 2px solid rgba(255,255,255,0.15); border-radius: 50px;
    background: rgba(255,255,255,0.05);
    font-family: 'Fredoka One', cursive; font-size: 1.05rem;
    color: rgba(255,255,255,0.7); cursor: pointer;
    transition: all 0.2s; position: relative;
  }
  .btn-link:hover { border-color: var(--electric-blue); color: white; }
  .btn-link.copied { border-color: var(--lime); color: var(--lime); }

  /* ===== PARTY BG ===== */
  .party-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; background: radial-gradient(ellipse at 50% 30%, #1a0040 0%, #0a001a 70%); }
  .party-bg .streak {
    position: absolute; width: 2px; height: 80px;
    background: linear-gradient(to bottom, transparent, var(--hot-pink), transparent);
    opacity: 0.15; animation: streakFall linear infinite;
  }
  @keyframes streakFall {
    0% { transform: translateY(-100px) rotate(15deg); opacity: 0; }
    20% { opacity: 0.15; } 80% { opacity: 0.15; }
    100% { transform: translateY(110vh) rotate(15deg); opacity: 0; }
  }

  /* ===== MAIN CARD ===== */
  #mainCard {
    display: none; position: relative; z-index: 10;
    width: 360px; max-width: 92vw; text-align: center;
  }
  #mainCard.active { display: block; animation: cardEntry 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes cardEntry { 0% { opacity: 0; transform: scale(0.5) rotate(-5deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }

  .card-inner {
    background: linear-gradient(145deg, rgba(26,0,51,0.9), rgba(40,0,80,0.9));
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 28px; padding: 32px 24px;
    box-shadow: 0 0 60px rgba(255,45,135,0.15), 0 0 120px rgba(0,212,255,0.1);
    position: relative; overflow: hidden;
  }
  .card-inner::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: conic-gradient(from 0deg, transparent, rgba(255,45,135,0.05), transparent, rgba(0,212,255,0.05), transparent);
    animation: rotateBg 8s linear infinite;
  }
  @keyframes rotateBg { to { transform: rotate(360deg); } }
  .card-content { position: relative; z-index: 2; }

  .birthday-name {
    font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    color: var(--electric-blue); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 3px;
  }
  .birthday-title {
    font-family: 'Fredoka One', cursive; font-size: 2.4rem;
    background: linear-gradient(135deg, var(--hot-pink), var(--sunny), var(--lime), var(--electric-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; background-size: 300% 300%;
    animation: gradientShift 3s ease infinite;
    line-height: 1.1; margin-bottom: 16px;
  }
  @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  .birthday-message {
    font-family: 'Sacramento', cursive; font-size: 1.4rem;
    color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.3;
  }
  .interaction-zone {
    min-height: 220px; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; margin-bottom: 16px;
  }
  .hint-text { font-size: 0.85rem; color: rgba(255,255,255,0.4); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

  /* ===== CANDLE GAME ===== */
  .cake-container { position: relative; display: inline-block; }
  .cake {
    width: 160px; height: 90px;
    background: linear-gradient(180deg, #ff8fc7 0%, #e84393 50%, #c44569 100%);
    border-radius: 12px 12px 20px 20px; position: relative;
    box-shadow: 0 8px 30px rgba(232,67,147,0.3);
  }
  .cake::before {
    content: ''; position: absolute; top: -8px; left: 0; width: 100%; height: 16px;
    background: linear-gradient(90deg, var(--sunny), #ffcc00, var(--sunny));
    border-radius: 8px 8px 0 0;
  }
  .candles-row { position: absolute; top: -55px; left: 50%; transform: translateX(-50%); display: flex; gap: 18px; }
  .candle {
    width: 8px; height: 40px;
    background: linear-gradient(180deg, var(--electric-blue), var(--purple));
    border-radius: 3px 3px 0 0; position: relative; cursor: pointer;
  }
  .flame {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 18px;
    background: radial-gradient(ellipse, #fff 0%, var(--sunny) 40%, var(--orange) 70%, transparent 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 0.3s ease-in-out infinite alternate;
    transition: opacity 0.3s, transform 0.3s;
  }
  .flame.out { opacity: 0; transform: translateX(-50%) scale(0); }
  @keyframes flicker { 0% { transform: translateX(-50%) scale(1) rotate(-3deg); } 100% { transform: translateX(-50%) scale(1.1) rotate(3deg); } }
  .smoke {
    position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 0; background: rgba(255,255,255,0.25);
    border-radius: 50%; opacity: 0; transition: all 0.5s;
  }
  .smoke.visible { height: 20px; opacity: 0.3; top: -40px; animation: smokeFade 1.5s forwards; }
  @keyframes smokeFade { 0% { opacity: 0.3; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) translateY(-30px); } }

  /* ===== PARTY POPPER ===== */
  .popper-zone { position: relative; }
  .popper {
    font-size: 5rem; cursor: pointer; display: inline-block;
    animation: popperBounce 1s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,45,135,0.4));
    transition: transform 0.3s;
  }
  .popper:hover { transform: scale(1.15) rotate(-5deg); }
  @keyframes popperBounce { 0%,100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
  .pull-string {
    width: 3px; height: 50px; margin: 0 auto;
    background: linear-gradient(to bottom, var(--sunny), var(--orange));
    border-radius: 2px; cursor: pointer; position: relative; transition: all 0.3s;
  }
  .pull-string::after {
    content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 14px; background: var(--sunny); border-radius: 50%;
    box-shadow: 0 2px 10px rgba(255,225,86,0.5);
  }

  /* ===== SCRATCH OFF ===== */
  .scratch-container {
    width: 280px; height: 120px; position: relative; border-radius: 16px; overflow: hidden;
    cursor: crosshair; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .scratch-message {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a0040, #2d0060); padding: 16px;
  }
  .scratch-message span { font-family: 'Sacramento', cursive; font-size: 1.6rem; color: var(--sunny); text-align: center; line-height: 1.3; }
  .scratch-canvas { position: absolute; inset: 0; border-radius: 16px; }

  /* ===== CONFETTI ===== */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden; }
  .confetti-piece { position: absolute; top: -20px; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(1080deg) scale(0.5); opacity: 0; } }

  /* ===== FINAL ===== */
  #finalCelebration {
    display: none; position: fixed; inset: 0; z-index: 200;
    align-items: center; justify-content: center;
    background: rgba(10,0,26,0.92);
  }
  #finalCelebration.active { display: flex; }
  .final-content { text-align: center; animation: finalPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  @keyframes finalPop { 0% { opacity: 0; transform: scale(0.3); } 100% { opacity: 1; transform: scale(1); } }
  .final-emoji { font-size: 4.5rem; animation: partyBounce 0.6s ease-in-out infinite alternate; display: inline-block; }
  .final-emoji:nth-child(2) { animation-delay: 0.1s; }
  .final-emoji:nth-child(3) { animation-delay: 0.2s; }
  @keyframes partyBounce { 0% { transform: translateY(0) rotate(-5deg); } 100% { transform: translateY(-15px) rotate(5deg); } }
  .final-text {
    font-family: 'Fredoka One', cursive; font-size: 2.4rem;
    background: linear-gradient(135deg, var(--hot-pink), var(--sunny), var(--lime), var(--electric-blue), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; background-size: 400% 400%;
    animation: gradientShift 2s ease infinite; margin: 16px 0 8px;
  }
  .final-sub { font-family: 'Sacramento', cursive; font-size: 1.5rem; color: rgba(255,255,255,0.6); }
  .final-dismiss {
    margin-top: 28px; padding: 12px 32px; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px; background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6); font-family: 'Baloo 2', cursive; font-size: 1rem;
    cursor: pointer; transition: all 0.25s; backdrop-filter: blur(4px);
  }
  .final-dismiss:hover { background: rgba(255,255,255,0.15); color: white; }

  @media (max-width: 400px) {
    .birthday-title { font-size: 1.9rem; }
    .setup-card { padding: 24px 18px; }
    #mainCard { width: 320px; }
    .scratch-container { width: 240px; height: 100px; }
    .game-opt { flex: 1 1 100%; }
  }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setupScreen">
  <div class="setup-card">
    <h2>🎉 Party Time!</h2>
    <p class="sub">Customize your card, then send the link!</p>

    <label>Birthday person's name</label>
    <input type="text" id="nameInput" placeholder="e.g. Sarah" maxlength="20">

    <label>From</label>
    <input type="text" id="fromInput" placeholder="e.g. Your bestie" maxlength="30">

    <label>Personal message</label>
    <textarea id="msgInput" placeholder="e.g. Wishing you the most amazing year ahead!"></textarea>

    <div class="game-picker">
      <label>Pick the surprise interaction</label>
      <div class="game-options">
        <div class="game-opt selected" data-game="random" onclick="selectGame(this)">
          <span class="game-emoji">🎲</span> Random
        </div>
        <div class="game-opt" data-game="candles" onclick="selectGame(this)">
          <span class="game-emoji">🕯️</span> Blow candles
        </div>
        <div class="game-opt" data-game="popper" onclick="selectGame(this)">
          <span class="game-emoji">🎊</span> Party popper
        </div>
        <div class="game-opt" data-game="scratch" onclick="selectGame(this)">
          <span class="game-emoji">✨</span> Scratch off
        </div>
      </div>
    </div>

    <div class="setup-buttons">
      <button class="btn-go" onclick="startParty()">Preview 🎂</button>
      <button class="btn-link" id="btnCopyLink" onclick="copyLink()">Copy Link 🔗</button>
    </div>
  </div>
</div>

<!-- PARTY BG -->
<div class="party-bg" id="partyBg"></div>

<!-- MAIN CARD -->
<div id="mainCard">
  <div class="card-inner">
    <div class="card-content">
      <div class="birthday-name" id="displayName"></div>
      <div class="birthday-title">HAPPY<br>BIRTHDAY! 🎂</div>
      <div class="birthday-message" id="displayMessage"></div>
      <div class="interaction-zone" id="interactionZone"></div>
      <div class="hint-text" id="hintText"></div>
    </div>
  </div>
</div>

<!-- FINAL -->
<div id="finalCelebration">
  <div class="final-content">
    <span class="final-emoji">🎉</span>
    <span class="final-emoji">🥳</span>
    <span class="final-emoji">🎊</span>
    <div class="final-text" id="finalText">Party On!</div>
    <div class="final-sub" id="finalSub"></div>
    <button class="final-dismiss" onclick="dismissFinal()">✨ Thanks! ✨</button>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
  // ---- State ----
  let bdayName = '', fromName = '', personalMsg = '', chosenGame = 'random';
  const GAMES = ['candles', 'popper', 'scratch'];

  // ---- Game picker ----
  function selectGame(el) {
    document.querySelectorAll('.game-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    chosenGame = el.dataset.game;
  }

  // ---- URL Params: encode/decode ----
  function buildParams() {
    const n = document.getElementById('nameInput').value.trim();
    const f = document.getElementById('fromInput').value.trim();
    const m = document.getElementById('msgInput').value.trim();
    const g = chosenGame;
    const params = new URLSearchParams();
    if (n) params.set('n', n);
    if (f) params.set('f', f);
    if (m) params.set('m', m);
    if (g && g !== 'random') params.set('g', g);
    return params.toString();
  }

  function readParams() {
    const params = new URLSearchParams(window.location.search);
    if (!params.has('n')) return false;
    bdayName = params.get('n') || 'Birthday Star';
    fromName = params.get('f') || '';
    personalMsg = params.get('m') || 'Hope your day is absolutely incredible!';
    chosenGame = params.get('g') || 'random';
    return true;
  }

  // ---- Copy shareable link ----
  function copyLink() {
    const base = window.location.origin + window.location.pathname;
    const qs = buildParams();
    const url = qs ? base + '?' + qs : base;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('btnCopyLink');
      btn.textContent = 'Copied! ✅';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Link 🔗'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
      // Fallback
      prompt('Copy this link:', base + '?' + qs);
    });
  }

  // ---- Start ----
  function startParty() {
    bdayName = document.getElementById('nameInput').value.trim() || 'Birthday Star';
    fromName = document.getElementById('fromInput').value.trim() || '';
    personalMsg = document.getElementById('msgInput').value.trim() || 'Hope your day is absolutely incredible!';
    launchCard();
  }

  function launchCard() {
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('displayName').textContent = bdayName.toUpperCase();
    document.getElementById('displayMessage').textContent = `"${personalMsg}"`;
    initBg();
    loadGame();
    document.getElementById('mainCard').classList.add('active');
  }

  function loadGame() {
    let game = chosenGame;
    if (game === 'random') game = GAMES[Math.floor(Math.random() * GAMES.length)];
    const zone = document.getElementById('interactionZone');
    const hint = document.getElementById('hintText');
    zone.innerHTML = '';
    switch(game) {
      case 'candles': initCandles(zone, hint); break;
      case 'popper': initPopper(zone, hint); break;
      case 'scratch': initScratch(zone, hint); break;
    }
  }

  // ---- Auto-launch if URL has params ----
  window.addEventListener('DOMContentLoaded', () => {
    if (readParams()) launchCard();
  });

  // ---- Background ----
  function initBg() {
    const bg = document.getElementById('partyBg');
    if (bg.children.length > 0) return;
    const colors = ['var(--hot-pink)','var(--electric-blue)','var(--sunny)','var(--purple)','var(--lime)'];
    for (let i = 0; i < 15; i++) {
      const s = document.createElement('div');
      s.className = 'streak';
      s.style.left = Math.random()*100+'%';
      s.style.animationDuration = (4+Math.random()*6)+'s';
      s.style.animationDelay = Math.random()*5+'s';
      s.style.background = `linear-gradient(to bottom, transparent, ${colors[i%colors.length]}, transparent)`;
      s.style.height = (40+Math.random()*80)+'px';
      bg.appendChild(s);
    }
  }

  // ========== CANDLES ==========
  function initCandles(zone, hint) {
    hint.textContent = '🕯️ Tap the candles to blow them out!';
    zone.innerHTML = `
      <div class="cake-container">
        <div class="candles-row">
          ${[0,1,2,3,4].map(i => `
            <div class="candle" onclick="blowCandle(${i})">
              <div class="flame" id="flame${i}"></div>
              <div class="smoke" id="smoke${i}"></div>
            </div>
          `).join('')}
        </div>
        <div class="cake"></div>
      </div>`;
    window._candlesLeft = 5;
  }
  function blowCandle(i) {
    const flame = document.getElementById('flame'+i);
    const smoke = document.getElementById('smoke'+i);
    if (flame.classList.contains('out')) return;
    flame.classList.add('out');
    smoke.classList.add('visible');
    miniConfetti(3);
    window._candlesLeft--;
    if (window._candlesLeft <= 0) setTimeout(showFinal, 600);
  }

  // ========== POPPER ==========
  function initPopper(zone, hint) {
    hint.textContent = '🎊 Pull the string to pop it!';
    zone.innerHTML = `
      <div class="popper-zone">
        <div class="popper" id="popperEmoji">🎉</div>
        <div class="pull-string" id="pullString" onclick="pullPopper()"></div>
      </div>`;
    window._popperPulled = false;
  }
  function pullPopper() {
    if (window._popperPulled) return;
    window._popperPulled = true;
    const string = document.getElementById('pullString');
    const popper = document.getElementById('popperEmoji');
    string.style.height = '0px'; string.style.opacity = '0';
    popper.style.animation = 'none';
    popper.style.transform = 'scale(1.5) rotate(-30deg)';
    popper.style.transition = 'transform 0.3s';
    megaConfetti();
    setTimeout(() => { popper.style.transform = 'scale(1) rotate(0deg)'; }, 300);
    setTimeout(showFinal, 1200);
  }

  // ========== SCRATCH ==========
  function initScratch(zone, hint) {
    hint.textContent = '✨ Scratch to reveal your surprise!';
    const secretMsgs = [
      `${bdayName}, you're one in a million! 🌟`,
      `The world is better with ${bdayName} in it! 💫`,
      `${bdayName}, you deserve ALL the cake! 🎂`,
      `${bdayName} = absolute legend! 🏆`,
      `${bdayName}, today is YOUR day! 👑`
    ];
    const msg = secretMsgs[Math.floor(Math.random()*secretMsgs.length)];
    zone.innerHTML = `
      <div class="scratch-container" id="scratchContainer">
        <div class="scratch-message"><span>${msg}</span></div>
        <canvas class="scratch-canvas" id="scratchCanvas"></canvas>
      </div>`;

    setTimeout(() => {
      const canvas = document.getElementById('scratchCanvas');
      const container = document.getElementById('scratchContainer');
      canvas.width = container.offsetWidth;
      canvas.height = container.offsetHeight;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
      grad.addColorStop(0,'#c0c0c0'); grad.addColorStop(0.5,'#e0e0e0'); grad.addColorStop(1,'#a0a0a0');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
      for (let x = -canvas.height; x < canvas.width; x += 8) {
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+canvas.height,canvas.height); ctx.stroke();
      }
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.font = '600 16px "Baloo 2", cursive';
      ctx.textAlign = 'center';
      ctx.fillText('✨ Scratch Here! ✨', canvas.width/2, canvas.height/2+6);

      let isScratching = false;
      let revealed = false;

      function scratch(x, y) {
        if (revealed) return;
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI*2); ctx.fill();
        checkProgress();
      }
      function checkProgress() {
        const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
        let clear = 0;
        for (let i = 3; i < data.length; i += 16) { if (data[i] === 0) clear++; }
        if (clear / (data.length/16) > 0.45) {
          revealed = true;
          canvas.style.transition = 'opacity 0.5s'; canvas.style.opacity = '0';
          miniConfetti(10);
          setTimeout(showFinal, 800);
        }
      }
      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
      }
      canvas.addEventListener('mousedown', e => { isScratching = true; scratch(getPos(e).x, getPos(e).y); });
      canvas.addEventListener('mousemove', e => { if (isScratching) scratch(getPos(e).x, getPos(e).y); });
      canvas.addEventListener('mouseup', () => isScratching = false);
      canvas.addEventListener('mouseleave', () => isScratching = false);
      canvas.addEventListener('touchstart', e => { e.preventDefault(); isScratching = true; scratch(getPos(e).x, getPos(e).y); }, {passive:false});
      canvas.addEventListener('touchmove', e => { e.preventDefault(); if (isScratching) scratch(getPos(e).x, getPos(e).y); }, {passive:false});
      canvas.addEventListener('touchend', () => isScratching = false);
    }, 100);
  }

  // ========== CONFETTI ==========
  function miniConfetti(count) {
    const c = document.getElementById('confettiContainer');
    const colors = ['#ff2d87','#00d4ff','#ffe156','#7cff51','#b24dff','#ff6b35','#fff'];
    for (let i = 0; i < (count||8); i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        const color = colors[Math.floor(Math.random()*colors.length)];
        const size = 6+Math.random()*8;
        el.style.left = 30+Math.random()*40+'%';
        el.style.animationDuration = (1.5+Math.random()*2)+'s';
        if (Math.random() > 0.6) {
          el.textContent = ['🎉','⭐','✨','🎊','🎈'][Math.floor(Math.random()*5)];
          el.style.fontSize = size+'px';
        } else {
          el.style.width = size+'px'; el.style.height = size+'px';
          el.style.background = color;
          el.style.borderRadius = Math.random() < 0.5 ? '50%' : '2px';
        }
        c.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i*50);
    }
  }

  function megaConfetti() {
    const c = document.getElementById('confettiContainer');
    const colors = ['#ff2d87','#00d4ff','#ffe156','#7cff51','#b24dff','#ff6b35','#fff','#ff8fc7','#48dbfb'];
    for (let i = 0; i < 150; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        const color = colors[Math.floor(Math.random()*colors.length)];
        const size = 5+Math.random()*12;
        el.style.left = Math.random()*100+'%';
        el.style.animationDuration = (2+Math.random()*3)+'s';
        if (Math.random() > 0.7) {
          el.textContent = ['🎉','⭐','✨','🎊','🎈','🎁','🥳','💫'][Math.floor(Math.random()*8)];
          el.style.fontSize = (10+Math.random()*14)+'px';
        } else {
          el.style.width = size+'px'; el.style.height = size+'px';
          el.style.background = color;
          el.style.borderRadius = Math.random() < 0.35 ? '50%' : '2px';
        }
        c.appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }, i*20);
    }
  }

  // ========== FINAL ==========
  function showFinal() {
    megaConfetti();
    document.getElementById('finalText').textContent = `Happy Birthday, ${bdayName}! 🎂`;
    document.getElementById('finalSub').textContent = fromName ? `With love, ${fromName} 💖` : 'Have the best day ever! 💖';
    document.getElementById('finalCelebration').classList.add('active');
  }

  function dismissFinal() {
    const f = document.getElementById('finalCelebration');
    f.style.transition = 'opacity 0.4s'; f.style.opacity = '0';
    setTimeout(() => {
      f.classList.remove('active'); f.style.opacity = ''; f.style.transition = '';
      loadGame();
    }, 400);
  }
</script>
